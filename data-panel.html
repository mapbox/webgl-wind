<!DOCTYPE html>
<html>
<head>
<title>风场数据可视化平台</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
    background: #1a1a1a;
    color: #fff;
    overflow: hidden;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 320px;
    background: #2d2d2d;
    border-right: 1px solid #444;
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
}

.main-content {
    flex: 1;
    position: relative;
    background: #000;
}

#coastline { 
    background: black; 
}

#canvas, #coastline { 
    display: block; 
    width: 100%; 
    height: 100%; 
    position: absolute; 
}

.sidebar h2 {
    color: #fff;
    margin-bottom: 20px;
    font-size: 18px;
    border-bottom: 2px solid #4CAF50;
    padding-bottom: 10px;
}

.file-upload {
    margin-bottom: 30px;
}

.file-upload label {
    display: block;
    background: #4CAF50;
    color: white;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    margin-bottom: 10px;
    transition: background 0.3s;
}

.file-upload label:hover {
    background: #45a049;
}

.file-upload input[type="file"] {
    display: none;
}

.data-list {
    margin-top: 20px;
}

.data-item {
    background: #3d3d3d;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 15px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s;
}

.data-item:hover {
    background: #4d4d4d;
    border-color: #4CAF50;
}

.data-item.active {
    background: #4CAF50;
    border-color: #4CAF50;
}

.data-item h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: #fff;
}

.data-item p {
    font-size: 12px;
    color: #ccc;
    margin: 4px 0;
}

.refresh-btn {
    width: 100%;
    background: #2196F3;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 20px;
    transition: background 0.3s;
}

.refresh-btn:hover {
    background: #1976D2;
}

.refresh-btn:disabled {
    background: #666;
    cursor: not-allowed;
}

.status {
    margin-top: 10px;
    padding: 10px;
    border-radius: 4px;
    font-size: 12px;
}

.status.loading {
    background: rgba(33, 150, 243, 0.2);
    border: 1px solid #2196F3;
    color: #64B5F6;
}

.status.success {
    background: rgba(76, 175, 80, 0.2);
    border: 1px solid #4CAF50;
    color: #81C784;
}

.status.error {
    background: rgba(244, 67, 54, 0.2);
    border: 1px solid #F44336;
    color: #E57373;
}

.dg .function .property-name { 
    width: 100%; 
}

.controls-section {
    font-size: 12px;
}

.control-group {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.control-group label {
    color: #ccc;
    font-size: 12px;
    font-weight: normal;
}

.control-group input[type="range"] {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: #555;
    outline: none;
    -webkit-appearance: none;
}

.control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4CAF50;
    cursor: pointer;
}

.control-group input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4CAF50;
    cursor: pointer;
    border: none;
}

.control-group span {
    color: #4CAF50;
    font-size: 11px;
    text-align: right;
}

@media (max-width: 768px) {
    .sidebar {
        width: 280px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>风场数据管理</h2>
        
        <div class="file-upload">
            <label for="fileInput">上传 NC 文件</label>
            <input type="file" id="fileInput" accept=".nc" multiple>
            <p style="font-size: 12px; color: #ccc; margin-top: 10px;">
                支持 NetCDF (.nc) 格式文件
            </p>
        </div>

        <div class="data-list">
            <h3 style="margin-bottom: 15px;">可用数据</h3>
            <div id="dataItems"></div>
        </div>

        <button class="refresh-btn" id="refreshBtn" disabled>
            刷新地图显示
        </button>

        <div class="controls-section" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #444;">
            <h3 style="margin-bottom: 15px; color: #fff;">风场控制</h3>
            
            <div class="control-group">
                <label for="particleCount">粒子数量:</label>
                <input type="range" id="particleCount" min="1024" max="589824" value="65536" step="1024">
                <span id="particleCountValue">65536</span>
            </div>
            
            <div class="control-group">
                <label for="fadeOpacity">衰减透明度:</label>
                <input type="range" id="fadeOpacity" min="0.96" max="0.999" value="0.96" step="0.001">
                <span id="fadeOpacityValue">0.96</span>
            </div>
            
            <div class="control-group">
                <label for="speedFactor">速度因子:</label>
                <input type="range" id="speedFactor" min="0.05" max="1.0" value="0.5" step="0.01">
                <span id="speedFactorValue">0.5</span>
            </div>
            
            <div class="control-group">
                <label for="dropRate">消失率:</label>
                <input type="range" id="dropRate" min="0" max="0.1" value="0" step="0.001">
                <span id="dropRateValue">0</span>
            </div>
            
            <div class="control-group">
                <label for="dropRateBump">消失率峰值:</label>
                <input type="range" id="dropRateBump" min="0" max="0.2" value="0" step="0.001">
                <span id="dropRateBumpValue">0</span>
            </div>
        </div>

        <div id="status" class="status" style="display: none;"></div>
    </div>

    <div class="main-content">
        <canvas id="coastline"></canvas>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.6.2/dat.gui.min.js"></script>
<script src="dist/wind-gl.js"></script>
<script src="demo/index.js"></script>
<script src="data-panel.js"></script>
</body>
</html>
